name: Keep Streamlit Alive

on:
  schedule:
    # Every 25 minutes — Streamlit Cloud sleeps after ~30 min of inactivity
    - cron: '*/25 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: |
          # Hit the main URL first (triggers full app wake)
          curl -sS -o /dev/null -w "Main: HTTP %{http_code} in %{time_total}s\n" \
            --max-time 120 \
            --retry 3 \
            --retry-delay 10 \
            "https://signalsynth.streamlit.app/" || true

          # Then hit the health endpoint to confirm it's responsive
          curl -sS -o /dev/null -w "Health: HTTP %{http_code} in %{time_total}s\n" \
            --max-time 30 \
            --retry 2 \
            "https://signalsynth.streamlit.app/?health" || true
